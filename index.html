<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AI Labs — Windows XP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --face: #ece9d8;
  --dark-shadow: #404040;
  --shadow: #808080;
  --highlight: #ffffff;
  --win-blue: #0055ea;
}
html, body {
  width: 100%; height: 100vh;
  background: radial-gradient(ellipse at 50% 40%, #4a82c0 0%, #244e8a 100%);
  font-family: Tahoma, 'MS Sans Serif', Geneva, sans-serif;
  font-size: 11px;
  overflow: hidden;
  user-select: none;
}
.desktop {
  width: 100%;
  height: calc(100vh - 30px);
  padding: 16px 12px;
  display: flex; flex-direction: column; flex-wrap: wrap;
  align-content: flex-start; gap: 8px;
}
.desk-icon {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 5px 6px;
  border: 1px solid transparent; border-radius: 3px; width: 76px;
}
.desk-icon:hover   { border-color: rgba(160,190,255,0.6); background: rgba(58,110,165,0.45); }
.desk-icon.selected{ border-color: rgba(160,190,255,0.9); background: rgba(58,110,165,0.65); }
.desk-icon-img { font-size: 36px; filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.55)); line-height: 1; }
.desk-icon-lbl { color: white; font-size: 11px; text-shadow: 1px 1px 3px #000, -1px -1px 2px #000; text-align: center; line-height: 1.3; word-break: break-word; }

/* TASKBAR */
.taskbar { position: fixed; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(180deg, #245edc 0%, #1a4abf 8%, #1e52c8 50%, #1a4abf 51%, #2462d4 100%); display: flex; align-items: center; padding: 0 4px; gap: 4px; z-index: 1000; border-top: 1px solid #5088e0; }
.start-btn { background: linear-gradient(180deg, #60c060 0%, #38a038 50%, #2c8c2c 51%, #50b050 100%); border: 1px solid #206020; border-radius: 10px 6px 6px 10px; padding: 2px 12px 2px 6px; color: white; font-weight: bold; font-size: 13px; font-family: Tahoma, sans-serif; text-shadow: 1px 1px #0006; cursor: pointer; height: 24px; display: flex; align-items: center; gap: 4px; }
.start-btn:hover { filter: brightness(1.08); }
.taskbar-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.25); margin: 0 2px; }
.taskbar-clock { margin-left: auto; background: linear-gradient(180deg, #1a4abf, #2462d4); border: 1px solid #4070c0; border-top-color: #80aae0; color: white; font-size: 11px; padding: 2px 10px; height: 22px; display: flex; align-items: center; border-radius: 2px; }

/* CONTEXT MENU */
.ctx-menu { display: none; position: fixed; background: var(--face); border: 1px solid; border-color: var(--highlight) var(--dark-shadow) var(--dark-shadow) var(--highlight); box-shadow: 2px 2px 6px #0005; z-index: 3000; min-width: 140px; padding: 2px 0; }
.ctx-item { padding: 4px 20px 4px 28px; cursor: pointer; font-size: 11px; }
.ctx-item:hover { background: var(--win-blue); color: white; }
.ctx-item.bold { font-weight: bold; }
.ctx-sep { height: 1px; background: var(--shadow); margin: 2px 4px; }

/* MSG DIALOG */
.msg-overlay { display: none; position: fixed; inset: 0; background: #0005; z-index: 5000; align-items: center; justify-content: center; }
.msg-overlay.show { display: flex; }
.msg-win { background: var(--face); border: 2px solid; border-color: var(--highlight) var(--dark-shadow) var(--dark-shadow) var(--highlight); box-shadow: 4px 4px 12px #0007; min-width: 260px; max-width: 340px; }
.msg-title { background: linear-gradient(180deg, #2b5fce, #1a4fa0); color: white; font-weight: bold; font-size: 12px; padding: 3px 8px; display: flex; align-items: center; justify-content: space-between; }
.msg-close { cursor: pointer; background: linear-gradient(#f4f0e4,#d0ccc0); border: 1px solid; border-color: var(--highlight) var(--dark-shadow) var(--dark-shadow) var(--highlight); padding: 0 5px; color: #000; font-size: 10px; }
.msg-body { padding: 16px 20px; font-size: 12px; display: flex; gap: 12px; align-items: flex-start; }
.msg-footer { padding: 8px; text-align: center; }
.xp-btn { background: linear-gradient(180deg, #f4f2ec 0%, #e8e4d8 40%, #d8d4c8 41%, #e4e0d4 100%); border: 1px solid; border-color: var(--highlight) var(--dark-shadow) var(--dark-shadow) var(--highlight); padding: 3px 24px; font-family: Tahoma, sans-serif; font-size: 11px; cursor: pointer; border-radius: 3px; }
.xp-btn:hover { background: linear-gradient(180deg, #fffce8, #ffe8a0 40%, #f0d870 41%, #ffe0a0); }
</style>
</head>
<body>

<div class="desktop" id="desktop">
  <div class="desk-icon" id="icon-puzzle"
       ondblclick="openApp('puzzle/index.html')"
       onclick="selectIcon('icon-puzzle')"
       oncontextmenu="showCtx(event,'puzzle/index.html')">
    <div class="desk-icon-img">🧩</div>
    <div class="desk-icon-lbl">8 Puzzle Solver</div>
  </div>
  <div class="desk-icon" id="icon-queens"
       ondblclick="openApp('queens/index.html')"
       onclick="selectIcon('icon-queens')"
       oncontextmenu="showCtx(event,'queens/index.html')">
    <div class="desk-icon-img">♛</div>
    <div class="desk-icon-lbl">8 Rainhas</div>
  </div>
  <div class="desk-icon" id="icon-docs"
       onclick="selectIcon('icon-docs')"
       ondblclick="showMsg('Meus Documentos está vazio.')">
    <div class="desk-icon-img">📁</div>
    <div class="desk-icon-lbl">Meus Documentos</div>
  </div>
  <div class="desk-icon" id="icon-trash"
       onclick="selectIcon('icon-trash')"
       ondblclick="showMsg('A Lixeira está vazia.')">
    <div class="desk-icon-img">🗑️</div>
    <div class="desk-icon-lbl">Lixeira</div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item bold" onclick="ctxOpenApp()">Abrir</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="hideCtx()">Criar Atalho</div>
  <div class="ctx-item" onclick="hideCtx()">Renomear</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="hideCtx()">Propriedades</div>
</div>

<div class="msg-overlay" id="msgOverlay">
  <div class="msg-win">
    <div class="msg-title">
      <span>🪟 Windows XP</span>
      <span class="msg-close" onclick="document.getElementById('msgOverlay').classList.remove('show')">✕</span>
    </div>
    <div class="msg-body"><span style="font-size:28px">ℹ️</span><span id="msgText"></span></div>
    <div class="msg-footer"><button class="xp-btn" onclick="document.getElementById('msgOverlay').classList.remove('show')">OK</button></div>
  </div>
</div>

<div class="taskbar">
  <div class="start-btn">🪟 Iniciar</div>
  <div class="taskbar-sep"></div>
  <div class="taskbar-clock" id="clock">00:00</div>
</div>

<script src="desktop.js"></script>
</body>
</html>
